<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/imgs/logo.svg" type="image/x-icon">
    <link rel="stylesheet" href="./css/questionario.css">
    <script src="./js/sessao.js"></script>
    <title>Questionário</title>
</head>

<body onload="validarSessao()">
    <div id="container_questionario">
        <div id="menu_questionario">
            <ul>
                <li id="sair_questionario">
                    <button onclick="limparSessao()">Sair</button>
                </li>
                <li>
                    <span id="questao_atual">1</span>/18
                </li>
            </ul>
        </div>
        <div id="contaner_pergunta">
        </div>
    </div>
</body>
<script>

    let listaFkOpcao = [];
    let questaoAtual = 0;

    let jsonPerguntas = [];

    function loadPerguntas() {
        fetch("/questionario/listar/perguntas", {
            method: "GET",
            headers: {
                "Content-Type": "application/json"
            }
        }).then(response => response.json())
            .then(data => {
                jsonPerguntas = data;
                proximaPergunta();
            })
            .catch(error => {
                console.error("Erro ao carregar perguntas do questionário:", error);
                contaner_pergunta.innerHTML = "<p>Erro ao carregar perguntas. Tente novamente mais tarde.</p>";
            });
    }

    function proximaPergunta() {

        let id_usuario = sessionStorage.getItem("ID_USUARIO");

        if (questaoAtual == jsonPerguntas.length) {
            
                fetch(`/questionario/cadastrar/respostas/${id_usuario}`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        ListaFkOpcaoServer: listaFkOpcao
                    })
                }).then(resposta => {
                    if (resposta.ok) {
                        console.log("listaIds cadastrados com sucesso!");
                        window.location.href = "./dashboard.html";
                    } else {
                        console.error("Erro ao cadastrar os listaIds.");
                    }
                }).catch(erro => {
                    console.error("Erro na requisição:", erro);
                });
                return;

            
        }

        let pergunta = jsonPerguntas[questaoAtual].pergunta;
        let listaOpcoes = jsonPerguntas[questaoAtual].listaOpcoes;
        let ListaOpcoes = [];
        let listaIds = [];

        for (let i = 0; i < listaOpcoes.length; i++) {
            ListaOpcoes.push(listaOpcoes[i].opcao);
            listaIds.push(listaOpcoes[i].id);
        }

        questaoAtual++;
        questao_atual.innerHTML = questaoAtual;

        contaner_pergunta.innerHTML = `
                <h1 id="pergunta">${pergunta}</h1>
                <div id="opcoes_questionario">
                    <button class="opcao" id="opcao1" onclick="selecionarOpcao(${listaIds[0]})">${ListaOpcoes[0]}</button>
                    <button class="opcao" id="opcao2" onclick="selecionarOpcao(${listaIds[1]})">${ListaOpcoes[1]}</button>
                    <button class="opcao" id="opcao3" onclick="selecionarOpcao(${listaIds[2]})">${ListaOpcoes[2]}</button>
                    <button class="opcao" id="opcao4" onclick="selecionarOpcao(${listaIds[3]})">${ListaOpcoes[3]}</button>
                </div>
                `

    }

    function selecionarOpcao(fkOpcao) {
        listaFkOpcao.push(fkOpcao);
        proximaPergunta();

    }

    loadPerguntas();




</script>

</html>
